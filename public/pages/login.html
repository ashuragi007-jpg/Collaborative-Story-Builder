<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Login / Account</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <div id="app"></div>

  <template id="tpl-login">
  <section class="card login-card">
    <h2>User Login</h2>
    

    <form class="login-form">
      <input
        name="username"
        type="text"
        placeholder="Username"
        required
      />

      <input
        name="password"
        type="password"
        placeholder="Password"
        required
      />

      <button type="submit" class="login-btn">Login</button>
    </form>

    <p class="error" hidden></p>
  </section>
</template>
  <template id="tpl-user-create">
    <section class="card">
      <h2>Create user</h2>
      <form class="row">
        <input name="username" placeholder="Username" required />
        <input name="password" type="password" placeholder="Password" required />
<br>
        <label class="row">
          <input type="checkbox" name="tos" required />
          I accept the <a href="./tos.html" target="_blank">Terms of Service</a>
          and <a href="./privacy.html" target="_blank">Privacy Policy</a>
        </label>

        <button>Create</button>
      </form>
      <p class="error" hidden></p>
    </section>
  </template>

  <template id="tpl-account-manage">
  <section class="card">
    <h2>Manage account</h2>

    <div class="account-info">
      <h3>Information</h3>
      <p><strong>ID:</strong> <span class="info-id"></span></p>
      <p><strong>Username:</strong> <span class="info-username"></span></p>
      <p><strong>Created:</strong> <span class="info-created"></span></p>
    </div>

    <div class="account-change">
      <h3>Change</h3>

      <form class="row edit-form">
        <input name="username" placeholder="New username" required />
        <button type="submit">Save username</button>
      </form>

      <form class="row password-form">
        <input name="password" type="password" placeholder="New password" required />
        <button type="submit">Save password</button>
      </form>
    </div>

    <div class="account-actions">
      <button class="logout-btn" type="button">Logout</button>
      <button class="delete-btn" type="button">Delete my account</button>
    </div>

    <p class="error" hidden></p>
  </section>
</template>

  <script type="module" src="../loginApp.mjs"></script>
</body>
</html>
