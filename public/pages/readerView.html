<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Story Reader</title>
  <link rel="stylesheet" href="../styles/readerStyle.css">
</head>
<body>

  <button class="back-btn" data-target="/">Back</button>

  <main class="reader-page">

    <section class="reader-top">
      <div class="reader-cover">IMG</div>

      <div class="reader-meta">
        <div class="reader-title-box">
          <h1 id="story-title">Loading story...</h1>
        </div>

        <div class="reader-info-box">
          <p id="story-writer">By: <span id="story-author"></span></p>
          <p id="story-created"></p>
        </div>
      </div>
    </section>

    <section class="reader-description-box">
      <p id="story-description"></p>
    </section>

    <section class="chapters-section">
      <h2>List of chapters</h2>
      <hr>
      <div id="chapters-container">
        <p>Loading chapters...</p>
      </div>
    </section>

  </main>

  <script type="module" src="../utils/backButton.mjs"></script>
  <script type="module" src="../controllers/readerApp.mjs"></script>
</body>
</html>
