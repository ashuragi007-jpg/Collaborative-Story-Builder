<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Story</title>

    <link rel="stylesheet" href="../styles/indexStyle.css">
</head>
<body>
    
    <header class="app-header">
        <h1>Create Story</h1>
    </header>

    <main>
        <form id="create-story-form">
            <label for="story-title" class="visually-hidden">Story title</label>
            <input 
            id="story-title"
            name="title"
            type="text"
            placeholder="Story title"
            />

            <label for="story-description" class="visually-hidden">Description</label>
            <textarea name="description" id="story-description" placeholder="Description"></textarea>

            <button type="submit">Save Story!</button>
        </form>

        <p id="story-form-error" class="error" hidden></p>
    </main>

    <script type="module" src="../controllers/createStoryApp.mjs"></script>
</body>
</html>
