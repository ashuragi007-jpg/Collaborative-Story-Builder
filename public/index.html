<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collaboraive Story Builder</title>
</head>
<body>

    <header class="app-header">
        <h1>Collaboraive Story Builder</h1>
        <p class="tagline">Write and make the story together. Make countless posibilities together</p>

        <button id="create-story-btn">Create Story</button>
    </header>

    <section id="create-story-section" hidden>
        <h2>Create Story</h2>

        <p id="story-form-error" class="error" role="alert" hidden></p>
    </section>

    <section class="library">
        <h2>Library</h2>

        <div id="stories-list"></div>
    </section>
    

    <main id="app"></main>
    <link rel="stylesheet" href="./styles/indexStyle.css">
    <script type="module" src="../controllers/storyBuilderApp.mjs"></script>

</body>
</html>
